<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isla Terminal - Decoder</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden; touch-action: none;
            font-family: monospace;
        }
        .lang-selector { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .lang-btn {
            background-color: #000a00; color: #33ff33; border: 2px solid #005500;
            padding: 8px 16px; cursor: pointer; font-family: monospace; font-weight: bold;
            box-shadow: 0 0 10px #002200; transition: all 0.2s ease;
        }
        .lang-btn:hover, .lang-btn.active {
            background-color: #003300; color: #ffffff; border-color: #33ff33; box-shadow: 0 0 15px #005500;
        }
        .game-container {
            position: relative;
            width: 600px;
            height: 900px;
            max-width: 100vw;
            max-height: 80vh;
        }
        canvas {
            border: 2px solid #005500; box-shadow: 0 0 20px #003300;
            background-color: #000a00; width: 100%; height: 100%; object-fit: contain;
        }
        /* Retro Boot Overlay Screens Style Settings */
        .boot-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000a00;
            border: 2px solid #005500;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
            color: #33ff33;
            text-align: center;
            box-sizing: border-box;
            padding: 20px;
        }
        .boot-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px #005500; }
        .boot-desc { font-size: 14px; margin-bottom: 40px; max-width: 80%; line-height: 1.6; color: #88ff88; }
        .boot-btn {
            background-color: #001500; color: #33ff33; border: 2px solid #33ff33;
            padding: 15px 30px; font-size: 16px; font-family: monospace; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 15px #003300; transition: all 0.2s ease;
        }
        .boot-btn:hover { background-color: #003300; color: #ffffff; box-shadow: 0 0 25px #33ff33; }
    </style>
</head>
<body>

    <div class="lang-selector">
        <button id="btn-es" class="lang-btn active" onclick="switchLanguage('es', this)">SPANISH (ES)</button>
        <button id="btn-de" class="lang-btn" onclick="switchLanguage('de', this)">GERMAN (DE)</button>
        <button id="btn-fr" class="lang-btn" onclick="switchLanguage('fr', this)">FRENCH (FR)</button>
        <button id="btn-ru" class="lang-btn" onclick="switchLanguage('ru', this)">RUSSIAN (RU)</button>
    </div>

    <div class="game-container">
        <!-- Interactive Splascreen Block Element -->
        <div id="bootScreen" class="boot-overlay">
            <div class="boot-title">ISLA TERMINAL V1.4</div>
            <div class="boot-desc">WARNING: Secure multi-language transceiver pathways are corrupted. Interface sound synths require immediate terminal decryption initialization.</div>
            <button class="boot-btn" onclick="initializeSystemHardware()">INITIALIZE SYSTEM HARDWARE</button>
        </div>
        <canvas id="terminal" width="600" height="900"></canvas>
    </div>

    <!-- Inline Global Security Gateway (Fixed loader race-condition error) -->
    <script>
        window.initializeSystemHardware = function() {
            // Hide the overlay screen smoothly
            const overlay = document.getElementById('bootScreen');
            if (overlay) overlay.style.display = 'none';

            // Wake up the Web Audio API audio context cleanly
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (AudioCtx) {
                    const context = new AudioCtx();
                    if (context.state === 'suspended') context.resume();
                }
            } catch (e) {
                console.warn("Audio Context activation failed:", e);
            }

            // Fire up the core game loop inside game.js safely
            if (typeof setupMobileKeypad === "function") setupMobileKeypad();
            if (typeof loadLanguagePack === "function") loadLanguagePack(currentLanguage);
            if (typeof playFX === "function") playFX("correct");
        }
    </script>

    <script src="game.js?v=splash_fix_build_final"></script>
</body>
</html>
